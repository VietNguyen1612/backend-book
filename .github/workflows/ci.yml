name: CI

# Runs the book's quality gates on every push and pull request:
#   * Markdown lint (markdownlint-cli2, using .markdownlint-cli2.yaml)
#   * Python lint + byte-compile of homework skeletons (ruff, py_compile)
#   * Repo structure checks (internal links, code fences, TOC/index drift,
#     last-reviewed stamps) via the scripts in scripts/
# All commands mirror what is run locally, so a green CI == a green local run.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: markdownlint-cli2
        run: npx --yes markdownlint-cli2

  python-and-structure:
    name: Python + structure checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: python -m pip install --upgrade pip ruff

      - name: Ruff lint
        run: ruff check .

      - name: Byte-compile homework skeletons
        run: |
          python - <<'PY'
          import glob, sys, py_compile
          failed = False
          for f in sorted(glob.glob("chapters/**/*.py", recursive=True)):
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  print(e); failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Internal link check
        run: python scripts/check_links.py

      - name: Code-fence balance check
        run: python scripts/check_fences.py

      - name: TOC / index drift check
        run: python scripts/check_toc.py

      - name: Last-reviewed stamp check
        run: python scripts/check_last_reviewed.py

      - name: Search index freshness
        run: python scripts/build_search_index.py --check
